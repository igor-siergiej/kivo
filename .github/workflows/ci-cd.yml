name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: '*'

jobs:
  lint:
    uses: igor-siergiej/utils/.github/workflows/reusable-lint-test.yml@main
    with:
      test-command: 'bun test'
    secrets: inherit

  release:
    if: github.event_name == 'push'
    needs: lint
    uses: igor-siergiej/utils/.github/workflows/reusable-release.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git submodule update --init --recursive
      - run: git pull origin main
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Publish Docker image
        run: bash .github/workflows-utils/pipelines/scripts/publish-images.sh kivo ${{ steps.version.outputs.version }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - name: Trigger API deployment
        run: |
          curl -X POST --fail-with-body \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n" \
            "${{ secrets.DEPLOY_API_URL }}" \
            -d '{"event":"deployment","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","ref":"${{ github.ref }}"}'
