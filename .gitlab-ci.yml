# GitLab CI configuration for Kivo Authentication Service
include:
  - project: 'imapps/utils'
    file: 'templates.yml'

variables:
  PROJECT_NAME: "kivo"
  # Disable TLS for Docker-in-Docker
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_TLS_VERIFY: ""
  # Additional variables to ensure TLS is disabled
  DOCKER_CERT_PATH: ""
  DOCKER_TLS_CA_CERT: ""
  # Use cluster-internal registry DNS name
  CI_REGISTRY: "registry.registry.svc.cluster.local:5000"
  REGISTRY_URL: "registry.registry.svc.cluster.local:5000"
  # Use custom bun-git image from internal registry (includes git, ssh, ca-certificates)
  CI_IMAGE: "registry.registry.svc.cluster.local:5000/bun-git:latest"

# CI job - extends the Bun template
ci:
  extends: .ci-bun-template
  image: $CI_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Version release - bump version and create tag after successful builds
version-release:
  extends: .version-release-bun-template
  image: $CI_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci
    - docker-build

# Build kivo Docker image (test build with SHA tag)
docker-build:
  extends: .docker-build-template
  before_script:
    - until docker info; do sleep 1; done
  variables:
    APP_NAME: "kivo"
    DOCKERFILE_PATH: "Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Publish kivo Docker image with semantic version
docker-publish:
  extends: .docker-publish-rebuild-template
  variables:
    APP_NAME: "kivo"
    DOCKERFILE_PATH: "Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true

# Update staging environment automatically
gitops-staging:
  extends: .gitops-staging-helm-template
  variables:
    HELM_VALUES: "apps/workloads/kivo/values.yaml,image.tag;apps/workloads/kivo/values-staging.yaml,image.tag"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - version-release
    - docker-publish

# Manual production deployment
gitops-production:
  extends: .production-deploy-helm-template
  variables:
    HELM_VALUES: "apps/workloads/kivo/values.yaml,image.tag;apps/workloads/kivo/values-production.yaml,image.tag"
  needs:
    - version-release
    - gitops-staging
